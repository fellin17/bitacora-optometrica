<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test Login</title>
<style>
body{font-family:sans-serif;background:#050f28;color:white;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;box-sizing:border-box}
.box{background:rgba(255,255,255,.1);border-radius:16px;padding:28px;width:100%;max-width:380px}
h2{margin:0 0 20px;text-align:center}
input{width:100%;padding:12px;margin-bottom:12px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:white;font-size:16px;box-sizing:border-box}
button{width:100%;padding:14px;border:none;border-radius:8px;background:#1565C0;color:white;font-size:16px;cursor:pointer;font-weight:bold}
#msg{margin-top:12px;padding:10px;border-radius:8px;display:none;font-size:14px;text-align:center}
.ok{background:rgba(0,200,0,.2);border:1px solid green}
.err{background:rgba(200,0,0,.2);border:1px solid red}
</style>
</head>
<body>
<div class="box">
  <h2>👁️ Test Login</h2>
  <input type="email" id="email" placeholder="Correo" value="alfredo.martinezramirez@gmail.com">
  <input type="password" id="pass" placeholder="Contraseña">
  <button onclick="testLogin()">Iniciar Sesión</button>
  <div id="msg"></div>
</div>

<script>
const API_KEY = "AIzaSyBtX91M46Mk-x2ncGGD3u5Gekm4hWk6VV4";

function msg(text, type){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = type;
  el.style.display = 'block';
}

async function testLogin(){
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  
  msg('Conectando...', '');
  
  try {
    const res = await fetch(
      `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${API_KEY}`,
      {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password: pass, returnSecureToken: true})
      }
    );
    const data = await res.json();
    
    if(data.error){
      msg('❌ Error: ' + data.error.message, 'err');
    } else {
      msg('✅ Login exitoso! Token: ' + data.idToken.substring(0,20) + '...', 'ok');
    }
  } catch(e){
    msg('❌ Fetch error: ' + e.message, 'err');
  }
}
</script>
</body>
</html>
